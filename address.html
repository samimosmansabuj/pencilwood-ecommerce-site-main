<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Address Book — Pencilwood</title>
<link rel="stylesheet" href="css/home.css">

</head>
<body>

<div id="toast-container"></div>
<div id="topnavbar-container"></div>

<div class="page">

  <h1>My Addresses</h1>

  <!-- ADDRESS LIST -->
  <!-- ADDRESS LIST -->
<div class="address-list" id="addressList">
</div>

  <!-- ADD NEW -->
  <div class="address-form">
    <h2>Add New Address</h2>
  
    <input type="text" id="addrName" placeholder="Full Name">
    <input type="text" id="addrPhone" placeholder="Phone">
  
    <!-- ✅ DISTRICT SELECT -->
    <select id="deliverydistrict">
      <option value="">Select District</option>
    </select>
  
    <textarea id="addrText" placeholder="Full Address"></textarea>
  
    <button id="addAddressBtn">Add Address</button></div>
