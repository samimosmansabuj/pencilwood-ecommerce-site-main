<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Address Book — Pencilwood</title>
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/address.css">
</head>

<body>
  <!-- Components placeholders -->
  <div id="toast-container"></div>
  <div id="float-wa"></div>
  <div id="drawer-container"></div>

  <div id="topnavbar-container"></div>
  <div id="subnavbar-container"></div>
  <div id="bc-br" class="bc-br-section"></div>


  <div class="page">

    <h1>My Addresses</h1>

    <!-- ADDRESS LIST -->
    <!-- ADDRESS LIST -->
    <div class="address-list" id="addressList">
    </div>

    <!-- ADD NEW -->
    <div class="address-form">
      <h2>Add New Address</h2>

      <input type="text" id="addrName" placeholder="Full Name">
      <input type="text" id="addrPhone" placeholder="Phone">

      <!-- ✅ DISTRICT SELECT -->
      <select id="deliverydistrict">
        <option value="">Select District</option>
      </select>

      <textarea id="addrText" placeholder="Full Address"></textarea>

      <button id="addAddressBtn">Add Address</button>
    </div>

    <!-- <div id="footer-container"></div> -->
    <div id="eco-container"></div>

    <script src="js/main.js"></script>
    <script src="js/loadComponents.js"></script>


</body>

</html>
