<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart — Pencilwood</title>
<meta name="description" content="View all items in your cart. Adjust quantity, remove items, see subtotal and checkout easily.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/home.css">
<link rel="stylesheet" href="css/cart.css"></head>
<body>
<body>

  <!-- Reusable Components -->
  <div id="toast-container"></div>
  <div id="float-wa"></div>
  <div id="drawer-container"></div>
  
  <div id="topnavbar-container"></div>
  <div id="subnavbar-container"></div>
  <div id="bc-br"></div>

  <!-- ══ CART PAGE ══ -->
  <div class="page">

    <h1 class="cart-title">Your Shopping Cart</h1>

    <!-- CART ITEMS LIST -->
    <div class="cart-items" id="cartItemsContainer">
      <!-- Example Cart Item Component -->
      <!-- Each cart item will be injected via JS or can be hardcoded as HTML if preferred -->
      
      <div class="cart-items" id="cartItemsContainer"></div>
     
    </div>

    <!-- CART SUMMARY -->
    <div class="cart-summary">
      <div class="summary-row"><span>Subtotal:</span><span id="cartSubtotal">৳ 0</span></div>
      <!-- <div class="summary-row"><span>Shipping:</span><span id="cartShipping">৳ 0</span></div> -->
      <div class="summary-row total"><span>Total:</span><span id="cartTotal">৳ 0</span></div>
      <button class="btn-checkout" onclick="goToCheckout()">Proceed to Checkout</button>    </div>

  </div><!-- /page -->

  <!-- Footer -->
  <!-- <div id="footer-container"></div> -->
  <div id="eco-container"></div>

  <!-- JS -->
  <script src="js/main.js"></script>
  <script src="js/loadComponents.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
    loadCartItems();     // render cart items
    updateCartCount();   // update top navbar dot
    updateWishlistCount(); // optional, if navbar shows wishlist count
});

function goToCheckout() {
    const selected = [];

    document.querySelectorAll('.cart-check:checked').forEach(cb => {
        const id = cb.dataset.id;
        const item = getCart().find(i => i.id === id);
        if (item) selected.push(item);
    });

    localStorage.setItem("checkoutItems", JSON.stringify(selected));
    window.location.href = "checkout.html";
}
  </script>
</body>
</html>
